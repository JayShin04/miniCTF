{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="ptitle">Change Password</div>
<div class="psub">// JWT 인증 기반 비밀번호 변경</div>

<div class="card">
  <h2>🔑 비밀번호 변경</h2>
  <p>현재 계정: <strong style="color:var(--blue)">{{ username }}</strong></p>
  <form method="POST" action="{{ url_for('change_password') }}">
    <label>New Password</label>
    <input type="password" name="new_password" placeholder="new password"/>
    <button class="btn" type="submit">Change Password</button>
  </form>

  {% if msg %}
  <div class="result-box fi">
    <div class="result-hd">
      <span class="{{ 'err' if is_err else 'ok' }}">●</span> result
    </div>
    <div class="result-bd {{ 'err' if is_err else 'ok' }}">{{ msg }}</div>
  </div>
  {% endif %}
</div>
{% endblock %}
